{{ define "main" }}
<article>
    <header class="mb-4 pb-3 border-bottom">
        <h1 class="mb-1">{{ .Title }}</h1>
        {{ if .Params.subtitle }}<p class="text-muted mb-0">{{ .Params.subtitle }}</p>{{ end }}
    </header>
    <div class="page-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
