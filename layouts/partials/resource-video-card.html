{{- $resource    := .resource -}}

<div class="col">
    <div class="card h-100 resource-video-card">
        <div class="card-body py-3 d-flex flex-column">
            <div class="fw-semibold mb-3">{{ $resource.title }}</div>
            {{ if $resource.description }}<p class="text-muted small mb-3">{{ $resource.description }}</p>{{ end }}
            <div class="ratio ratio-16x9 mt-auto">
                <iframe src="https://www.youtube.com/embed/{{ $resource.youtubeId }}" title="{{ $resource.title }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>
